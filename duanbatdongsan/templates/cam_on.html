<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cảm ơn quý khách</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f7f3ed; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .thank-you-box { background: linear-gradient(135deg, #4a252f 0%, #3e2129 100%); color: white; padding: 50px; border-radius: 12px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.2); max-width: 500px; }
        h1 { font-family: 'Oswald', sans-serif; color: #d4af37; font-size: 2.5rem; margin-top: 0; }
        p { line-height: 1.6; font-size: 1.1rem; margin-bottom: 30px; }
        .btn-back { display: inline-block; padding: 12px 30px; background-color: #d4af37; color: white; text-decoration: none; font-weight: bold; border-radius: 6px; text-transform: uppercase; font-family: 'Oswald', sans-serif; transition: 0.3s; }
        .btn-back:hover { background-color: #b5952f; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="thank-you-box">
        <h1>ĐĂNG KÝ THÀNH CÔNG</h1>
        <p>Cảm ơn anh/chị <strong>{{ ten_khach }}</strong>.<br>Hệ thống đã ghi nhận yêu cầu tư vấn cho dự án <strong>{{ ten_du_an }}</strong>. Chuyên viên của chúng tôi sẽ liên hệ lại trong thời gian sớm nhất!</p>
        <a href="/" class="btn-back">Quay lại Trang Chủ</a>

    </div>
</body>
</html>
